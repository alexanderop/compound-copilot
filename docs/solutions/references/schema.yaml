# Documentation schema for learnings written by ccompound
# Treat this as the canonical frontmatter contract for docs/solutions/.
#
# The schema has two tracks based on problem_type:
#   Bug track  — problem_type is a defect or failure (build_error, test_failure, etc.)
#   Knowledge track — problem_type is guidance or practice (best_practice, workflow_issue, etc.)
#
# Both tracks share the same required core fields. The tracks differ in which
# additional fields are required vs optional (see track_rules below).

# --- Track classification ---------------------------------------------------
tracks:
  bug:
    description: "Defects, failures, and errors that were diagnosed and fixed"
    problem_types:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  knowledge:
    description: "Best practices, workflow improvements, patterns, and documentation"
    problem_types:
      - best_practice
      - documentation_gap
      - workflow_issue
      - developer_experience

# --- Fields required by BOTH tracks -----------------------------------------
required_fields:
  module:
    type: string
    description: "Module or area affected"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date documented (YYYY-MM-DD)"

  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
      - developer_experience
      - workflow_issue
      - best_practice
      - documentation_gap
    description: "Primary category — determines track (bug vs knowledge)"

  component:
    type: enum
    values:
      - frontend
      - backend
      - api
      - database
      - cli
      - ci_cd
      - testing
      - documentation
      - tooling
      - infrastructure
      - authentication
      - configuration
      - build_system
      - package_management
    description: "Component involved"

  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low
    description: "Impact severity"

# --- Track-specific rules ----------------------------------------------------
track_rules:
  bug:
    required:
      symptoms:
        type: array[string]
        min_items: 1
        max_items: 5
        description: "Observable symptoms such as errors or broken behavior"
      root_cause:
        type: enum
        values:
          - missing_dependency
          - wrong_api
          - config_error
          - logic_error
          - async_timing
          - memory_leak
          - scope_issue
          - missing_validation
          - missing_permission
          - version_mismatch
          - missing_type
          - missing_import
          - wrong_path
          - environment_mismatch
          - race_condition
        description: "Fundamental technical cause of the problem"
      resolution_type:
        type: enum
        values:
          - code_fix
          - config_change
          - dependency_update
          - test_fix
          - migration
          - environment_setup
          - documentation_update
          - tooling_addition
          - refactor
        description: "Type of fix applied"

  knowledge:
    optional:
      applies_when:
        type: array[string]
        max_items: 5
        description: "Conditions or situations where this guidance applies"
      symptoms:
        type: array[string]
        max_items: 5
        description: "Observable gaps or friction that prompted this guidance (optional for knowledge track)"
      root_cause:
        type: enum
        values:
          - missing_dependency
          - wrong_api
          - config_error
          - logic_error
          - async_timing
          - memory_leak
          - scope_issue
          - missing_validation
          - missing_permission
          - version_mismatch
          - missing_type
          - missing_import
          - wrong_path
          - environment_mismatch
          - race_condition
        description: "Underlying cause, if there is a specific one (optional for knowledge track)"
      resolution_type:
        type: enum
        values:
          - code_fix
          - config_change
          - dependency_update
          - test_fix
          - migration
          - environment_setup
          - documentation_update
          - tooling_addition
          - refactor
        description: "Type of change, if applicable (optional for knowledge track)"

# --- Fields optional for BOTH tracks ----------------------------------------
optional_fields:
  related_components:
    type: array[string]
    description: "Other components involved"

  tags:
    type: array[string]
    max_items: 8
    description: "Search keywords, lowercase and hyphen-separated"

  last_updated:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date of last update when refreshing an existing doc"

# --- Validation rules --------------------------------------------------------
validation_rules:
  - "Determine track from problem_type using the tracks section above"
  - "All shared required_fields must be present"
  - "Bug-track required fields (symptoms, root_cause, resolution_type) must be present on bug-track docs"
  - "Knowledge-track docs have no additional required fields beyond the shared ones"
  - "Enum fields must match allowed values exactly"
  - "Array fields must respect min_items/max_items when specified"
  - "date must match YYYY-MM-DD format"
  - "tags should be lowercase and hyphen-separated"
